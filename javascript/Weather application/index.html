<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #282c34;
      color: white;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      cursor: pointer;
      margin-left: 10px;
    }

    .weather {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>🌦 Weather App</h1>

  <input type="text" id="city" placeholder="Enter city name">
  <button onclick="getWeather()">Search</button>

  <div class="weather" id="weatherData"></div>

  <script>
    const apiKey = "https://api.e4f68850337367de8b7939e45121a000.org/data/2.5/weather?q=${cName}&units=metric&appid=ca018df54353f065aaed7d802825b8beAPI_KEY"; 

    function getWeather() {
      const city = document.getElementById("city").value;

      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
        .then(response => response.json())
        .then(data => {
          document.getElementById("weatherData").innerHTML = `
            <h2>${data.name}</h2>
            <p>🌡 Temp: ${data.main.temp} °C</p>
            <p>🌥 Weather: ${data.weather[0].main}</p>
            <p>💧 Humidity: ${data.main.humidity}%</p>
          `;
        })
        .catch(() => {
          document.getElementById("weatherData").innerHTML = "City not found ❌";
        });
    }
  </script>

</body>
</html>
