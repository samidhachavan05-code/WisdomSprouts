<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>String</title>
</head>

<body>
    <h1>String Opeartions</h1>
    <div class="container text-center">
        <textarea id="inputPAra" rows="5" cols="42" placeholder="Add input paragraph here..."></textarea>
    </div>
    <div id="output" class="container w-50 bg-secondary p-1 mb-3" style="height: 100px; color: white;">
        Result</div>

    <div class="container">
        <div class="row">
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary" 
                onclick="countVowels()"
                >
                    Count Vowels
                </button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Count Consonents
                </button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Convert to Upper Case
                </button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Convert to Lower Case</button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary"
                onclick="PalindromeCheck()"
                >
                    Check Palindrome</button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Reverse the Characters
                </button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Sort the Words </button>
            </div>
            <div class="col-3 mb-2">
                <button class="btn btn-outline-primary">
                    Count Spaces </button>
            </div>
            <div class="col mb-2">
                <button class="btn btn-outline-primary">
                    Count Lines
                </button>
            </div>
            <div class="col mb-2">
                <button class="btn btn-outline-primary">
                    Replace Space with hyphen(-)
            </div>
        </div>
    </div>




    <!-- custom js file  -->
    <script src="./script.js"></script>
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
