<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pagination + Filter</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    button { margin: 5px; padding: 5px 10px; }
  </style>
</head>
<body>

<h2>Project List</h2>

<select id="priorityFilter">
  <option value="All">All</option>
  <option value="High">High</option>
  <option value="Medium">Medium</option>
  <option value="Low">Low</option>
</select>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Priority</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div>
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>
const data = [
  {"id":"4","ProjectName":"E-Commerce Web App","priority":"High","status":"Completed"},
  {"id":"5","ProjectName":"Job Portal System","priority":"High","status":"In Progress"},
  {"id":"6","ProjectName":"CI/CD Pipeline Setup","priority":"Medium","status":"Completed"},
  {"id":"7","ProjectName":"Student Management System","priority":"High","status":"In Progress"},
  {"id":"8","ProjectName":"AI Chatbot","priority":"High","status":"Completed"},
  {"id":"9","ProjectName":"Portfolio Website","priority":"Low","status":"Completed"},
  {"id":"10","ProjectName":"Cloud Migration","priority":"High","status":"In Progress"},
  {"id":"11","ProjectName":"Inventory System","priority":"Medium","status":"Completed"},
  {"id":"12","ProjectName":"Blog Platform","priority":"Medium","status":"Completed"},
  {"id":"13","ProjectName":"CRM System","priority":"High","status":"In Progress"}
];

let currentPage = 1;
let itemsPerPage = 3;
let filteredData = [...data];

function displayData() {
  let start = (currentPage - 1) * itemsPerPage;
  let end = start + itemsPerPage;

  let pageData = filteredData.slice(start, end);

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  pageData.forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.ProjectName}</td>
        <td>${item.priority}</td>
        <td>${item.status}</td>
      </tr>`;
  });

  document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
}

function nextPage() {
  if (currentPage * itemsPerPage < filteredData.length) {
    currentPage++;
    displayData();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    displayData();
  }
}

// Filter

document.getElementById("priorityFilter").addEventListener("change", function () {
  let value = this.value;

  if (value === "All") {
    filteredData = [...data];
  } else {
    filteredData = data.filter(item => item.priority === value);
  }

  currentPage = 1;
  displayData();
});

// initial load

displayData();
</script>

</body>
</html>
