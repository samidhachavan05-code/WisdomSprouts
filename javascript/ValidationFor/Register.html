
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    #errBox{
      display: none;
    }
  </style>
</head>

<body>

<div class="container mt-5">
  <div class="row">
    <div class="col-12 col-md-6"></div>

    <div class="col-12 col-md-6 p-4 bg-light rounded mt-5 shadow">

      <h3 class="mb-3 text-center">Register</h3>

      <!-- ERROR BOX -->
      <div class="alert alert-danger alert-dismissible fade show" id="errBox"></div>

      <!-- USERNAME -->
      <div class="mb-3">
        <label class="form-label">User Name</label>
        <input type="text" class="form-control" id="InputUserName">
      </div>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="InputEmail1">
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="InputPassword1">
      </div>

      <!-- RE PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Repeat Password</label>
        <input type="password" class="form-control" id="ReInputPassword1">
      </div>

      <button class="btn btn-primary w-100" onclick="register()">Register</button>

    </div>
  </div>
</div>

<script>
let userNameElement = document.querySelector('#InputUserName')
let emailElement = document.querySelector('#InputEmail1')
let passwordElement = document.querySelector('#InputPassword1')
let rePasswordElement = document.querySelector('#ReInputPassword1')

function register(){

  let userName = userNameElement.value.trim()
  let email = emailElement.value.trim()
  let password = passwordElement.value.trim()
  let rePassword = rePasswordElement.value.trim()

  let errBox = document.getElementById("errBox")

  // hide error first
  errBox.style.display = "none"

  // USERNAME VALIDATION
  let speCharPattern = /[!@#$%^&*()_{}"]/g

  if(userName.length < 6){
    return showError("Username must be at least 6 characters")
  }

  if(speCharPattern.test(userName)){
    return showError("Username should not contain special characters")
  }

  // EMAIL VALIDATION
  let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
  if(!emailPattern.test(email)){
    return showError("Enter valid email address")
  }

  // PASSWORD VALIDATION
  let passPattern = /^(?=.*\d).{6,}$/
  if(!passPattern.test(password)){
    return showError("Password must be 6+ characters and include a number")
  }

  // MATCH PASSWORD
  if(password !== rePassword){
    return showError("Passwords do not match")
  }

  // CREATE USER OBJECT
  let user = {
    name: userName,
    email: email,
    password: password
  }

  // SAVE IN LOCAL STORAGE
  localStorage.setItem("user", JSON.stringify(user))

  alert("Register successful ✅")

  // REDIRECT
  window.location.href = "login.html"
}

function showError(msg){
  let errBox = document.getElementById("errBox")
  errBox.style.display = "block"
  errBox.innerHTML = msg + `
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  `
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
