<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Commerce</title>
    <link rel="stylesheet" href="./styles.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">E-Commerce</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" type="button" data-bs-toggle="modal" data-bs-target="#addProduct">Add
                            Product</a>
                    </li>
                </ul>
                <div class="d-flex" role="search">
                    <a href="./cart.html" class="nav-link">Cart<sup class="badge rounded-pill text-bg-danger" id="cartLength">0</sup></a>
                    <!-- add icon for basket from  fontAwesome  -->
                </div>
            </div>
        </div>
    </nav>


    <!-- Hero Section  -->

    <h1 class="text-center">Products</h1>
<nav class="text-center mb-2"><input type=search id="searchInput" placeholder="type here for search"/> 
    <button onclick="searchByName()">Search</button> 
    <button onclick="clearFilter()">Clear Filter</button>
    <!-- <select>
        <option>Select option</option>
        <option>Filter By category</option>
        <option>filter by brand </option>
        <option>low to high </option>
        <option>high to low</option>

    </select> -->
     </nav>
    <div class="container text-center">
        <div class="row" id="renderProducts"></div>
    </div>

    <!-- Modal for Add product -->
    <div class="modal fade" id="addProduct" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="title" placeholder="Add Product name here">
                            <label for="title">Title</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="description" placeholder="description">
                            <label for="description">Description</label>
                        </div>
                        <div class="form-floating mb-3">
                            <!-- <input type="text" class="form-control" id="category" placeholder="category"> -->
                            <label for="category">Category</label>
                            <!-- add select options for category  -->
                              
                             <select id="category">
                                <option value="">select options</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Kitchen Accessories">Kitchen Accessories</option>
                             </select>
                        </div>
                        <div class="form-floating mb-3">
                            <!-- <input type="text" class="form-control" id="brand" placeholder="brand"> -->
                            <label for="brand">Brand</label>
                            <!-- add select option for brand  -->
                               <select id="brand">
                                <option value="">select options</option>
                                <option value="Electronics">Samsung</option>
                                <option value="Kitchen Accessories">Hokins</option>
                             </select>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="price" placeholder="price">
                            <label for="price">Price</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="quantity" placeholder="quantity" value="10">
                            <label for="quantity">quantity</label>
                        </div>

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="AddNewProduct()">Add Product</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
